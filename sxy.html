			function plus(){
				var a=document.getElementById("plusA").value
				var b=document.getElementById("plusB").value
				var result=document.getElementById("plusResult")
				if(isNaN(a)||isNaN(b)){
					result.innerHTML="求求你瞪大你的眼睛看看你输的是不是数字"
					return;
				}
				result.innerHTML=Number(a)+Number(b)
			}
			function minus(){
				var a=document.getElementById("minusA").value
				var b=document.getElementById("minusB").value
				var result=document.getElementById("minusResult")
				if(isNaN(a)||isNaN(b)){
					result.innerHTML="求求你瞪大你的眼睛看看你输的是不是数字"
					return;

			}

			function divide(){
